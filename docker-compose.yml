version: '3.9'

services:
  bpm-engine:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://bpm:bpm@postgres:5432/bpm_engine
      REDIS_URL: redis://valkey:6379
      ADMIN_SECRET: ${ADMIN_SECRET:-changez-moi-en-production-32-chars-min}
      JWT_SECRET: ${JWT_SECRET:-changez-moi-aussi-32-chars-min}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started
    volumes:
      - ./admin:/app/admin
      - ./src:/app/src

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bpm
      POSTGRES_PASSWORD: bpm
      POSTGRES_DB: bpm_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bpm -d bpm_engine"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:latest
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes

volumes:
  postgres_data:
  valkey_data:
